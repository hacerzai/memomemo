/* Glass Morphism Styles */
.glass-header {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 0 0 24px 24px;
}

.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.glass-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    border-color: rgba(255, 255, 255, 0.35);
}

.glass-button {

    color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 0.75rem 1.5rem;
    border-radius: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
}

.glass-button:hover:not(:disabled) {

    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
}

<script>
// ======================== STORAGE ========================
let family = JSON.parse(localStorage.getItem('memocare_family') || '[]');
let faceModelsReady = false;

function makeId() {
  return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).substr(2, 8);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
}

function showNotif(msg, isError = false) {
  const div = document.createElement('div');
  div.className = `notification ${isError ? 'error' : ''}`;
  div.textContent = msg;
  div.setAttribute('role', 'alert');
  document.getElementById('notifContainer').appendChild(div);
  setTimeout(() => div.classList.add('show'), 50);
  setTimeout(() => { div.classList.remove('show'); setTimeout(() => div.remove(), 450); }, 4500);
}

function emergencyAlert() {
  showNotif('EMERGENCY! Help is on the way!', true);
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
}

function waitForImageLoad(img) {
  return new Promise((resolve, reject) => {
    if (img.complete && img.naturalWidth > 0) resolve();
    else {
      img.onload = () => resolve();
      img.onerror = () => reject(new Error('Image failed to load'));
    }
  });
}

// ======================== FACE RECOGNITION (Safe) ========================
async function loadFaceModels() {
  const statusDiv = document.getElementById('globalStatus');
  try {
    if (faceapi && faceapi.tf) {
      await faceapi.tf.setBackend('cpu');
    }
    const MODEL_URL = '/models';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
    faceModelsReady = true;
    statusDiv.innerHTML = '✔ Face AI ready - Will detect faces in photos';
  } catch (err) {
    console.warn('Face models not available:', err);
    faceModelsReady = false;
    statusDiv.innerHTML = '⚠️ Face recognition unavailable. You can still add contacts but face won\'t be detected.';
  }
}

// Check if an image contains a face (returns true/false and shows feedback)
async function checkImageForFace(imgElement, feedbackElement) {
  if (!faceModelsReady) {
    if (feedbackElement) {
      feedbackElement.className = 'face-feedback pending';
      feedbackElement.innerHTML = '⚠️ Face AI not loaded yet. Save without face detection.';
    }
    return { hasFace: true, descriptor: null };
  }

  try {
    await waitForImageLoad(imgElement);
    
    // Resize image for faster processing
    let width = imgElement.naturalWidth;
    let height = imgElement.naturalHeight;
    const MAX_SIZE = 300;
    if (width > MAX_SIZE) {
      const ratio = MAX_SIZE / width;
      width = MAX_SIZE;
      height = height * ratio;
    }

    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgElement, 0, 0, width, height);

    // Try multiple times with different settings
    let detection = await faceapi
      .detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 256, scoreThreshold: 0.5 }))
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      // Try with lower threshold
      detection = await faceapi
        .detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.3 }))
        .withFaceLandmarks()
        .withFaceDescriptor();
    }

    if (!detection) {
      if (feedbackElement) {
        feedbackElement.className = 'face-feedback error';
        feedbackElement.innerHTML = '❌ NO FACE DETECTED! Please choose a clear photo with a visible face facing the camera.';
      }
      return { hasFace: false, descriptor: null };
    }

    const descriptor = detection.descriptor;
    if (!descriptor || descriptor.length !== 128) {
      if (feedbackElement) {
        feedbackElement.className = 'face-feedback error';
        feedbackElement.innerHTML = '❌ Face detected but couldn\'t process. Try a different photo.';
      }
      return { hasFace: false, descriptor: null };
    }

    if (feedbackElement) {
      feedbackElement.className = 'face-feedback success';
      feedbackElement.innerHTML = '✔ Face detected successfully! This person can now be recognized.';
    }
    return { hasFace: true, descriptor: Array.from(descriptor) };

  } catch (err) {
    console.error('Face detection error:', err);
    if (feedbackElement) {
      feedbackElement.className = 'face-feedback error';
      feedbackElement.innerHTML = 'âŒ Error detecting face. Please try another photo.';
    }
    return { hasFace: false, descriptor: null };
  }
}

// ======================== RENDER CONTACTS ========================
function renderFamily() {
  const container = document.getElementById('familyList');
  if (family.length === 0) {
    container.innerHTML = `<div class="empty-message">
      <i class="fas fa-users-slash" style="font-size: 2rem; color: #9AAFC9;"></i>
      <p style="margin-top: 10px;"><b>No family members yet</b><br>Tap "Add Family Member" to start.</p>
    </div>`;
    return;
  }

  let html = '';
  family.forEach((member, idx) => {
    const picture = member.image || `https://ui-avatars.com/api/?background=ACC9FF&color=1A2A44&bold=true&name=${encodeURIComponent(member.name)}`;
    html += `
      <div class="contact-card">
        <div class="contact-left">
          <img src="${picture}" class="pfp" alt="${escapeHtml(member.name)}" onerror="this.src='https://ui-avatars.com/api/?background=D6E4FF&color=233B5E&name=${encodeURIComponent(member.name)}'">
          <div class="contact-text">
            <b>${escapeHtml(member.name)}</b>
            <p><i class="fas fa-hand-peace"></i> ${escapeHtml(member.relation || '')}</p>
            ${member.phone ? `<p><i class="fas fa-phone-alt"></i> ${escapeHtml(member.phone)}</p>` : ''}
            ${member.memory ? `<p><i class="fas fa-book-open"></i> ${escapeHtml(member.memory).substring(0, 35)}${member.memory.length > 35 ? '…' : ''}</p>` : ''}
          </div>
        </div>
        <div class="contact-actions">
          ${member.voice ? `<button onclick="window.playVoice(${idx})"><i class="fas fa-volume-up"></i></button>` : `<button disabled style="opacity:0.4;"><i class="fas fa-microphone-slash"></i></button>`}
          <button onclick="window.deleteContact(${idx})"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

window.playVoice = function(idx) {
  const voice = family[idx]?.voice;
  if (voice) {
    new Audio(voice).play().catch(e => alert('Could not play audio'));
  } else {
    alert('No voice recording');
  }
};

window.deleteContact = function(idx) {
  if (confirm(`Remove ${family[idx].name} from family?`)) {
    family.splice(idx, 1);
    localStorage.setItem('memocare_family', JSON.stringify(family));
    renderFamily();
  }
};

// ======================== MODAL: ADD CONTACT ========================
function openAddModal() {
  const modalDiv = document.createElement('div');
  modalDiv.className = 'modal';
  modalDiv.innerHTML = `
    <div class="modal-box">
      <h3><i class="fas fa-heart"></i> Add Loved One</h3>
      <input type="text" id="famName" placeholder="Full name *" autocomplete="off">
      <input type="text" id="famRelation" placeholder="Relationship (e.g. Daughter, Spouse) *">
      <input type="text" id="famPhone" placeholder="Phone number (optional)">
      <textarea id="famMemory" placeholder="Special memory or note (optional)"></textarea>
      <label style="font-weight:500; margin:5px 0 0; display:inline-block;">📸 Face photo * (clear portrait) — Upload or use camera</label>
      <div class="photo-input-row">
        <input type="file" id="faceImage" accept="image/jpeg,image/png,image/jpg" capture="environment">
        <button type="button" id="cameraBtn" class="camera-btn"><i class="fas fa-camera"></i> Use camera</button>
      </div>
      <div id="cameraCapture" class="camera-capture" style="display:none;">
        <video id="cameraPlayer" autoplay playsinline></video>
        <button type="button" id="capturePhotoBtn" class="capture-btn"><i class="fas fa-camera-retro"></i> Capture photo</button>
      </div>
      <div class="image-preview" id="imagePreview">
        <img id="previewImg" alt="Preview">
      </div>
      <div id="faceFeedback" class="face-feedback" style="display:none;"></div>
      
      <button id="recordVoiceBtn" class="voice-btn"><i class="fas fa-microphone"></i> Hold to record voice</button>
      <div class="record-hint" id="voiceHint">Hold button, speak, release to save</div>
      
      <div id="saveStatusMsg"></div>
      <div class="modal-actions">
        <button class="save-btn" id="confirmSaveBtn">Save member</button>
        <button class="cancel-btn" id="cancelModalBtn">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(modalDiv);

  const nameInp = modalDiv.querySelector('#famName');
  const relationInp = modalDiv.querySelector('#famRelation');
  const phoneInp = modalDiv.querySelector('#famPhone');
  const memoryInp = modalDiv.querySelector('#famMemory');
  const imageFile = modalDiv.querySelector('#faceImage');
  const imagePreview = modalDiv.querySelector('#imagePreview');
  const previewImg = modalDiv.querySelector('#previewImg');
  const faceFeedback = modalDiv.querySelector('#faceFeedback');
  const recordBtn = modalDiv.querySelector('#recordVoiceBtn');
  const voiceHint = modalDiv.querySelector('#voiceHint');
  const saveStatus = modalDiv.querySelector('#saveStatusMsg');
  const saveBtn = modalDiv.querySelector('#confirmSaveBtn');
  const cancelBtn = modalDiv.querySelector('#cancelModalBtn');

  let voiceDataURL = null;
  let mediaRecorder = null;
  let chunks = [];
  let recording = false;
  let stream = null;
  let currentDescriptor = null;
  let hasValidFace = false;
  let capturedImageDataURL = null;
  let cameraStream = null;

  // Image preview and face detection
  imageFile.addEventListener('change', async (e) => {
    capturedImageDataURL = null;
    stopCamera();
    const file = e.target.files[0];
    if (!file) {
      imagePreview.style.display = 'none';
      faceFeedback.style.display = 'none';
      hasValidFace = false;
      saveBtn.disabled = false;
      return;
    }

    const reader = new FileReader();
    reader.onload = async (event) => {
      previewImg.src = event.target.result;
      imagePreview.style.display = 'block';
      faceFeedback.style.display = 'block';
      faceFeedback.className = 'face-feedback pending';
      faceFeedback.innerHTML = '🔍 Checking for face...';
      hasValidFace = false;
      saveBtn.disabled = true;

      // Wait for image to load
      await new Promise((resolve) => {
        if (previewImg.complete) resolve();
        else previewImg.onload = resolve;
      });

      // Check for face
      const result = await checkImageForFace(previewImg, faceFeedback);
      hasValidFace = result.hasFace;
      currentDescriptor = result.descriptor;
      saveBtn.disabled = !hasValidFace;
    };
    reader.readAsDataURL(file);
  });

  // Voice recording with pointer events
  async function startRecording() {
    if (recording) return;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4' });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => {
          voiceDataURL = reader.result;
          voiceHint.innerHTML = '✔ Voice saved!';
          voiceHint.style.color = '#2C7A47';
        };
        reader.readAsDataURL(blob);
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
      };
      mediaRecorder.start();
      recording = true;
      recordBtn.classList.add('recording');
      recordBtn.innerHTML = '<i class="fas fa-stop-circle"></i> Release to stop';
      voiceHint.innerHTML = '🔴 Recording ... release when done';
    } catch (err) {
      voiceHint.innerHTML = '❌ Microphone permission denied';
    }
  }

  function stopRecording() {
    if (!recording || !mediaRecorder) return;
    if (mediaRecorder.state === 'recording') mediaRecorder.stop();
    recording = false;
    recordBtn.classList.remove('recording');
    recordBtn.innerHTML = '<i class="fas fa-microphone"></i> Hold to record voice';
    if (!voiceDataURL) {
      setTimeout(() => {
        if (!voiceDataURL) voiceHint.innerHTML = 'Hold button, speak, release to save';
      }, 300);
    }
  }

  recordBtn.addEventListener('pointerdown', startRecording);
  recordBtn.addEventListener('pointerup', stopRecording);
  recordBtn.addEventListener('pointercancel', stopRecording);
  recordBtn.addEventListener('pointerleave', stopRecording);

  const cameraBtn = modalDiv.querySelector('#cameraBtn');
  const cameraCapture = modalDiv.querySelector('#cameraCapture');
  const cameraPlayer = modalDiv.querySelector('#cameraPlayer');
  const capturePhotoBtn = modalDiv.querySelector('#capturePhotoBtn');

  function stopCamera() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(track => track.stop());
      cameraStream = null;
    }
    if (cameraPlayer) {
      cameraPlayer.srcObject = null;
    }
    if (cameraCapture) {
      cameraCapture.style.display = 'none';
    }
  }

  cameraBtn.addEventListener('click', async () => {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      cameraPlayer.srcObject = cameraStream;
      cameraCapture.style.display = 'block';
      cameraPlayer.play();
      faceFeedback.style.display = 'block';
      faceFeedback.className = 'face-feedback pending';
      faceFeedback.innerHTML = '🔍 Allow camera access and capture a clear face photo.';
      saveBtn.disabled = true;
    } catch (error) {
      faceFeedback.style.display = 'block';
      faceFeedback.className = 'face-feedback error';
      faceFeedback.innerHTML = '❌ Camera permission is required to use live capture.';
    }
  });

  capturePhotoBtn.addEventListener('click', async () => {
    if (!cameraPlayer || !cameraPlayer.videoWidth) return;
    const canvas = document.createElement('canvas');
    canvas.width = cameraPlayer.videoWidth;
    canvas.height = cameraPlayer.videoHeight;
    canvas.getContext('2d').drawImage(cameraPlayer, 0, 0, canvas.width, canvas.height);
    capturedImageDataURL = canvas.toDataURL('image/jpeg');
    previewImg.src = capturedImageDataURL;
    imagePreview.style.display = 'block';
    faceFeedback.style.display = 'block';
    faceFeedback.className = 'face-feedback pending';
    faceFeedback.innerHTML = '🔍 Checking captured face...';
    saveBtn.disabled = true;
    await new Promise((resolve) => {
      if (previewImg.complete) resolve();
      else previewImg.onload = resolve;
    });
    const result = await checkImageForFace(previewImg, faceFeedback);
    hasValidFace = result.hasFace;
    currentDescriptor = result.descriptor;
    saveBtn.disabled = !hasValidFace;
    stopCamera();
  });

  // Save contact
  saveBtn.addEventListener('click', async () => {
    const name = nameInp.value.trim();
    const relation = relationInp.value.trim();
    const phone = phoneInp.value.trim();
    const memory = memoryInp.value.trim();
    const file = imageFile.files[0];
    const imgDataURL = capturedImageDataURL || null;

    if (!name || !relation) {
      saveStatus.innerHTML = '❌ Name and relationship are required.';
      return;
    }
    if (!imgDataURL && !file) {
      saveStatus.innerHTML = '📸 Please select a photo.';
      return;
    }
    if (!hasValidFace) {
      saveStatus.innerHTML = '❌ No face detected in the photo. Please choose a clear face photo.';
      return;
    }

    saveStatus.innerHTML = '⏳ Saving...';

    const saveMember = async (dataURL) => {
      family.push({
        id: makeId(),
        name,
        relation,
        phone: phone || '',
        memory: memory || '',
        image: dataURL,
        voice: voiceDataURL,
        descriptor: currentDescriptor
      });
      localStorage.setItem('memocare_family', JSON.stringify(family));
      renderFamily();
      saveStatus.innerHTML = '✨ Saved successfully!';
      setTimeout(() => modalDiv.remove(), 800);
    };

    if (imgDataURL) {
      await saveMember(imgDataURL);
      return;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
      const imgDataURL = e.target.result;

      family.push({
        id: makeId(),
        name,
        relation,
        phone: phone || '',
        memory: memory || '',
        image: imgDataURL,
        voice: voiceDataURL,
        descriptor: currentDescriptor
      });
      localStorage.setItem('memocare_family', JSON.stringify(family));
      renderFamily();
      saveStatus.innerHTML = '✨ Saved successfully!';
      setTimeout(() => modalDiv.remove(), 800);
    };
    reader.readAsDataURL(file);
  });

  cancelBtn.addEventListener('click', () => modalDiv.remove());
}

// ======================== INIT ========================
window.addEventListener('DOMContentLoaded', async () => {
  const addBtn = document.getElementById('addFamilyBtn');
  if (addBtn) {
    addBtn.addEventListener('click', openAddModal);
    addBtn.onclick = openAddModal;
  }
  window.openAddModal = openAddModal;
  try {
    await loadFaceModels();
  } catch (err) {
    console.warn('Face models failed to load:', err);
  }
  renderFamily();
});
