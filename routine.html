<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMOCARE - Daily Routine</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 50%, #F1F5F9 100%);
            min-height: 100vh;
            color: #1E293B;
            font-size: 18px;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid #3B82F6;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E40AF, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .header-subtitle {
            color: #475569;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* FAB Container */
        .fab-container {
            position: fixed;
            right: 1.5rem;
            top: 5.5rem;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }
        .fab-add {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
            border: none;
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            box-shadow: 
                0 12px 32px rgba(16,185,129,0.4),
                0 0 0 4px rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fabFloat 3s ease-in-out infinite;
        }
        .fab-add:hover {
            transform: scale(1.15) rotate(90deg);
            box-shadow: 
                0 20px 48px rgba(16,185,129,0.6),
                0 0 0 6px rgba(255,255,255,0.4);
        }
        @keyframes fabFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Add Routine Modal */
        .add-routine-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .add-routine-modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 32px 80px rgba(0,0,0,0.25);
            transform: scale(0.8) translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .add-routine-modal.show .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .modal-header h3 {
            color: #1E293B;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .modal-header p {
            color: #64748B;
            font-size: 1.1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.8rem;
        }
        .form-group label {
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-group input {
            padding: 1.4rem 1.6rem;
            border: 3px solid #E2E8F0;
            border-radius: 20px;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            font-family: inherit;
            background: rgba(255,255,255,0.9);
            font-weight: 500;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 
                0 0 0 4px rgba(59,130,246,0.15),
                0 8px 25px rgba(0,0,0,0.1);
            background: white;
            transform: translateY(-2px);
        }
        .form-group input::placeholder {
            color: #9CA3AF;
            font-weight: 500;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .btn-primary, .btn-secondary {
            padding: 1.3rem 3rem;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            max-width: 200px;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
            color: white;
            box-shadow: 0 12px 32px rgba(16,185,129,0.4);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 20px 48px rgba(16,185,129,0.5);
        }
        .btn-primary:active:not(:disabled) {
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: transparent;
            color: #64748B;
            border: 3px solid #E2E8F0;
        }
        .btn-secondary:hover {
            background: #F1F5F9;
            border-color: #3B82F6;
            color: #1E40AF;
            transform: translateY(-2px);
        }
        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #9CA3AF;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .close-modal:hover {
            background: #F1F5F9;
            color: #EF4444;
            transform: rotate(90deg);
        }

        /* Container & List */
        .container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }
        .routine-list {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            margin-top: 2rem;
        }
        .routine-item {
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 2rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 16px 48px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(59,130,246,0.12);
            position: relative;
            backdrop-filter: blur(12px);
        }
        .routine-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.15);
            border-color: #3B82F6;
        }
        .routine-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .routine-time {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3B82F6;
            min-width: 85px;
            background: rgba(59,130,246,0.1);
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .routine-info {
            flex: 1;
            min-width: 0;
        }
        .routine-info h4 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #1E293B;
        }
        .routine-info p {
            color: #64748B;
            font-size: 1.1rem;
        }
        .btn-done {
            background: linear-gradient(135deg, #10B981, #34D399);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(16,185,129,0.3);
            white-space: nowrap;
            margin-right: 0.5rem;
        }
        .btn-done:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(16,185,129,0.4);
        }
        .btn-done:disabled {
            background: #9CA3AF;
            cursor: default;
            box-shadow: none;
        }
        .btn-delete {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(239,68,68,0.3);
            flex-shrink: 0;
            margin-left: 0.5rem;
        }
        .btn-delete:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 12px 28px rgba(239,68,68,0.4);
        }
        .completed {
            opacity: 0.88;
            background: linear-gradient(135deg, #ECFDF5, #D1FAE5);
            border-color: #10B981;
        }
        .completed .routine-info h4 {
            text-decoration: line-through;
            opacity: 0.85;
        }
        .empty-state {
            color: #9CA3AF;
            font-size: 1.4rem;
            text-align: center;
            padding: 4rem 2rem;
            margin-top: 2rem;
        }
        .empty-state i {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.4;
            display: block;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 1rem;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
            border-top: 4px solid #3B82F6;
            z-index: 1000;
        }
        .nav-item {
            text-decoration: none;
            color: #64748B;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.8rem;
            border-radius: 16px;
            flex: 1;
            margin: 0 0.5rem;
        }
        .nav-item.active {
            color: #1E40AF;
            background: rgba(59,130,246,0.1);
            transform: scale(1.05);
        }
        .nav-icon { font-size: 1.8rem; margin-bottom: 0.4rem; }

        /* Emergency Button */
        .emergency-btn {
            position: fixed;
            bottom: 100px;
            right: 1.5rem;
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
            border: 3px solid #FCA5A5;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 12px 32px rgba(239,68,68,0.4);
            z-index: 1100;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 12px 32px rgba(239,68,68,0.4); }
            50% { box-shadow: 0 12px 32px rgba(239,68,68,0.7); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 25px;
            right: 25px;
            background: linear-gradient(135deg, #10B981, #34D399);
            color: white;
            padding: 1.3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.25);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            font-weight: 600;
            font-size: 1.1rem;
            max-width: 320px;
            backdrop-filter: blur(10px);
        }
        .notification.show { transform: translateX(0); }
        .notification.error { background: linear-gradient(135deg, #EF4444, #DC2626); }

        /* Responsive */
        @media (max-width: 768px) {
            .fab-container { right: 1rem; top: 5rem; }
            .fab-add { width: 70px; height: 70px; font-size: 2rem; }
            .routine-item { flex-direction: column; text-align: center; gap: 1.2rem; }
            .routine-time { order: -1; }
            .btn-done, .btn-delete { order: 99; margin: 0 0.5rem; }
        }

        /* Accessibility */
        button:focus { outline: 4px solid #3B82F6; outline-offset: 2px; }
    </style>
    <link rel="manifest" href="manifest.webmanifest">
    <link href="app-mobile.css" rel="stylesheet">
    <link href="chatbot.css" rel="stylesheet">

</head>
<body>
    <!-- FAB -->
    <div class="fab-container">
        <button class="fab-add" id="fabAddBtn" aria-label="Add new routine" title="Add Routine">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div class="header">
        <div class="logo">
            <i class="fas fa-calendar-check"></i> MEMOCARE
        </div>
        <div class="header-subtitle">Your Personalized Daily Routine</div>
    </div>

    <div class="container">
        <div class="routine-list" id="routineList"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-calendar-plus"></i>
            <div>Your daily routine is empty</div>
            <div>Tap the green + button to add your first routine!</div>
        </div>
    </div>

    <!-- ADD ROUTINE MODAL -->
    <div class="add-routine-modal" id="addRoutineModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn" aria-label="Close modal"></button>
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> Add New Routine</h3>
                <p>Create your personalized daily schedule</p>
            </div>
            <form id="routineForm">
                <div class="form-group">
                    <label for="routineTime">
                        <i class="fas fa-clock"></i> Time
                    </label>
                    <input type="time" id="routineTime" required placeholder="08:00">
                </div>
                <div class="form-group">
                    <label for="routineActivity">
                        <i class="fas fa-tasks"></i> Activity
                    </label>
                    <input type="text" id="routineActivity" placeholder="e.g., Take medicine, Morning walk, Breakfast" maxlength="50" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveRoutineBtn">
                        <i class="fas fa-check"></i> Add Routine
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home nav-icon"></i><span>Home</span>
        </a>
        <a href="routine.html" class="nav-item active">
            <i class="fas fa-calendar nav-icon"></i><span>Routine</span>
        </a>
        <a href="games.html" class="nav-item">
            <i class="fas fa-brain nav-icon"></i><span>Games</span>
        </a>
        <a href="caregiver.html" class="nav-item">
            <i class="fas fa-shield-alt nav-icon"></i><span>Safety</span>
        </a>
        <a href="contacts.html" class="nav-item">
            <i class="fas fa-users nav-icon"></i><span>Family</span>
        </a>
        <button class="nav-item ai-nav" onclick="document.getElementById('ai-fab').click()" style="background:none;border:none;cursor:pointer;"><span class="nav-icon"><i class="fas fa-robot"></i></span><span>AI</span></button>
    </nav>

    <!-- Emergency Button -->
    <button class="emergency-btn" id="emergencyBtn" aria-label="Emergency Help">
        <i class="fas fa-exclamation-triangle"></i>
    </button>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>
        // Global state
        let customRoutines = JSON.parse(localStorage.getItem('customRoutines') || '[]');
        let completed = JSON.parse(localStorage.getItem('routineCompleted') || '[]');

        // DOM Elements
        const modal = document.getElementById('addRoutineModal');
        const fabBtn = document.getElementById('fabAddBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const routineForm = document.getElementById('routineForm');
        const saveRoutineBtn = document.getElementById('saveRoutineBtn');
        const routineList = document.getElementById('routineList');
        const emptyState = document.getElementById('emptyState');
        const emergencyBtn = document.getElementById('emergencyBtn');
        const notification = document.getElementById('notification');

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('customRoutines', JSON.stringify(customRoutines));
            localStorage.setItem('routineCompleted', JSON.stringify(completed));
        }

        // Generate unique ID
        function generateId() {
            return 'routine_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // Get icon based on activity name
        function getIconForActivity(title) {
            const icons = {
                'medicine': 'fa-pills', 'pill': 'fa-pills', 'medication': 'fa-pills',
                'breakfast': 'fa-utensils', 'lunch': 'fa-utensils', 'dinner': 'fa-utensils',
                'walk': 'fa-walking', 'exercise': 'fa-dumbbell', 'yoga': 'fa-child-reaching',
                'bath': 'fa-tint', 'shower': 'fa-tint', 'wash': 'fa-soap',
                'sleep': 'fa-bed', 'rest': 'fa-bed', 'nap': 'fa-bed',
                'call': 'fa-phone', 'family': 'fa-users'
            };
            const lowerTitle = title.toLowerCase();
            for (let key in icons) {
                if (lowerTitle.includes(key)) return icons[key];
            }
            return 'fa-tasks';
        }

        // Get random color for routine
        function getColorForActivity() {
            const colors = ['#F59E0B', '#5A9DF2', '#10B981', '#8B5CF6', '#EF4444', '#F97316', '#06B6D4', '#EC4899'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // ADD ROUTINE - MAIN FUNCTION
        function addRoutine(time, activity) {
            // Validation
            if (!time || !activity.trim()) {
                showNotification('Please fill both time and activity', 'error');
                return false;
            }
            if (customRoutines.length >= 20) {
                showNotification('Maximum 20 routines allowed', 'error');
                return false;
            }

            // Create new routine
            const id = generateId();
            const routine = {
                id: id,
                time: time,
                title: activity.trim(),
                desc: `Time for ${activity.trim()}`,
                icon: getIconForActivity(activity),
                color: getColorForActivity(),
                custom: true,
                created: Date.now()
            };

            // Add to beginning of array (newest first)
            customRoutines.unshift(routine);
            saveData();
            renderRoutine();
            showNotification(`Added: ${activity.trim()}`, 'success');
            
            // Voice feedback
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(`Added ${activity.trim()} at ${time}`);
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            }
            
            return true;
        }

        // DELETE ROUTINE
        function deleteRoutine(id) {
            if (confirm('Delete this routine? This action cannot be undone.')) {
                customRoutines = customRoutines.filter(routine => routine.id !== id);
                completed = completed.filter(compId => compId !== id);
                saveData();
                renderRoutine();
                showNotification('Routine deleted', 'error');
            }
        }

        // COMPLETE TASK
        function completeTask(id, btnElement) {
            if (!completed.includes(id)) {
                completed.push(id);
                saveData();
                const item = document.getElementById(`task-${id}`);
                if (item) {
                    item.classList.add('completed');
                    btnElement.disabled = true;
                    btnElement.innerHTML = '<i class="fas fa-check"></i> Done';
                }
                showNotification('Great job completing your task!', 'success');
            }
        }

        // RENDER ROUTINES
        function renderRoutine() {
            const routines = [...customRoutines].sort((a, b) => {
                const timeA = parseInt(a.time.replace(':', '')) || 0;
                const timeB = parseInt(b.time.replace(':', '')) || 0;
                return timeA - timeB;
            });

            if (routines.length === 0) {
                routineList.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            routineList.style.display = 'flex';
            emptyState.style.display = 'none';

            routineList.innerHTML = routines.map(routine => {
                const isDone = completed.includes(routine.id);
                return `
                    <div class="routine-item ${isDone ? 'completed' : ''}" id="task-${routine.id}" tabindex="0">
                        <div class="routine-icon" style="background: linear-gradient(135deg, ${routine.color}, ${routine.color}cc);">
                            <i class="fas ${routine.icon}"></i>
                        </div>
                        <div class="routine-time">${routine.time}</div>
                        <div class="routine-info">
                            <h4>${routine.title}</h4>
                            <p>${routine.desc}</p>
                        </div>
                        <button class="btn-done" ${isDone ? 'disabled' : ''} 
                                onclick="completeTask('${routine.id}', this)"
                                aria-label="${isDone ? 'Completed' : 'Mark as done'}">
                            ${isDone ? '<i class="fas fa-check"></i> Done' : '<i class="fas fa-check"></i> Mark Done'}
                        </button>
                        <button class="btn-delete" onclick="deleteRoutine('${routine.id}')" 
                                aria-label="Delete routine" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // NOTIFICATION
        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.className = `notification ${type === 'error' ? 'error' : ''} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // MODAL EVENT LISTENERS
        fabBtn.addEventListener('click', () => {
            modal.classList.add('show');
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        cancelBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        // FORM SUBMISSION - FIXED!
        routineForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const timeInput = document.getElementById('routineTime');
            const activityInput = document.getElementById('routineActivity');
            
            const time = timeInput.value;
            const activity = activityInput.value;
            
            if (addRoutine(time, activity)) {
                // Clear form
                timeInput.value = '';
                activityInput.value = '';
                // Close modal
                modal.classList.remove('show');
                // Visual feedback
                saveRoutineBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    saveRoutineBtn.style.transform = '';
                }, 150);
            }
        });

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });

        // Enter key on activity field
        document.getElementById('routineActivity').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                routineForm.dispatchEvent(new Event('submit'));
            }
        });

        // Emergency button
        emergencyBtn.addEventListener('click', () => {
            showNotification('EMERGENCY ALERT! Family notified!', 'error');
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            if ('speechSynthesis' in window) {
                speechSynthesis.speak(new SpeechSynthesisUtterance('Emergency help activated!'));
            }
        });

        // Daily reset
        function checkDailyReset() {
            const today = new Date().toDateString();
            const lastReset = localStorage.getItem('lastReset');
            if (lastReset !== today) {
                completed = [];
                localStorage.setItem('lastReset', today);
                saveData();
            }
        }

        // Initialize app
        checkDailyReset();
        renderRoutine();

        // Welcome message
        setTimeout(() => {
            if ('speechSynthesis' in window) {
                speechSynthesis.speak(new SpeechSynthesisUtterance(' Tap the green plus button to add routines.'));
            }
        }, 800);
    </script>
    <script src="chatbot.js"></script>
</body>
</html>
